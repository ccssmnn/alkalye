name: alkalye
icon: public/icons/alkalye-icon.png
processes:
  Lazygit:
    command: lazygit
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Dev Server:
    command: bun run dev
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Helix:
    command: hx .
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Jazz Sync Server:
    command: bun run dev:sync
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
